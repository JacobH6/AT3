<!DOCTYPE html>
<html>
<body>

<h1>Register</h1>

<form action="/register" method="POST">
    <label>Username:</label>
    <input type="text" name="username">

    <br><br>

    <label>Password:</label>
    <input type="password" name="password">

    <br><br>

    <button type="submit">Register</button>
    {% if error %}
    <p style="color:red">{{ error }}</p>
    {% endif %}
</form>
<a href="/">Login</a>
</body>
</html>
